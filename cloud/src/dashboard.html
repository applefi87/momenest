<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>環境監測</title>
<script>
// 首屏就套用主題，避免深色系統裝置閃黑（預設淺色）
(function(){try{var t=localStorage.getItem('theme');if(['light','dark','auto'].indexOf(t)<0)t='light';if(t!=='auto')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #f5f5f7;
  --card-bg: rgba(255,255,255,0.72);
  --card-border: rgba(0,0,0,0.06);
  --card-shadow: 0 2px 16px rgba(0,0,0,0.04);
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --seg-bg: rgba(118,118,128,0.12);
  --seg-active: #fff;
  --seg-shadow: 0 1px 4px rgba(0,0,0,0.08);
  --chart-bg: rgba(255,255,255,0.72);
  --grid-color: rgba(0,0,0,0.04);
  --tick-color: #86868b;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
}
:root[data-theme="dark"] {
  --bg: #000;
  --card-bg: rgba(28,28,30,0.72);
  --card-border: rgba(255,255,255,0.08);
  --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #636366;
  --seg-bg: rgba(118,118,128,0.24);
  --seg-active: rgba(50,50,52,1);
  --seg-shadow: 0 1px 4px rgba(0,0,0,0.3);
  --chart-bg: rgba(28,28,30,0.72);
  --grid-color: rgba(255,255,255,0.05);
  --tick-color: #98989d;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #000;
    --card-bg: rgba(28,28,30,0.72);
    --card-border: rgba(255,255,255,0.08);
    --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --seg-bg: rgba(118,118,128,0.24);
    --seg-active: rgba(50,50,52,1);
    --seg-shadow: 0 1px 4px rgba(0,0,0,0.3);
    --chart-bg: rgba(28,28,30,0.72);
    --grid-color: rgba(255,255,255,0.05);
    --tick-color: #98989d;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
               "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  padding: 0 16px;
  padding-top: calc(var(--safe-top) + 16px);
  padding-bottom: 32px;
  min-height: 100dvh;
}

/* Header */
.header { padding: 8px 0 20px; }
.header .header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-actions { display: flex; gap: 8px; }
#langBtn { font-size: 0.78rem; font-weight: 600; }
.theme-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--card-border);
  border-radius: 50%;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-secondary);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.header .subtitle {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #30d158;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
}
.status-dot.offline { background: #ff453a; animation: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Cards grid */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease;
}
.card:active { transform: scale(0.97); }
.cards .card:last-child:nth-child(odd) { grid-column: 1 / -1; }
.card .label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card .label .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.card .value {
  font-size: 2rem;
  font-weight: 500;
  letter-spacing: -0.03em;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  transition: opacity 0.3s ease;
}
.card .unit {
  font-size: 1rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-left: 2px;
}
.card .spark {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  opacity: 0.4;
}

/* Segmented control */
.seg-wrap { margin-bottom: 20px; }
.seg {
  display: flex;
  background: var(--seg-bg);
  border-radius: 9px;
  padding: 2px;
  position: relative;
}
.seg button {
  flex: 1;
  padding: 7px 0;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 0.8rem;
  font-weight: 500;
  border-radius: 7px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: color 0.2s;
  font-family: inherit;
}
.seg .slider {
  position: absolute;
  top: 2px; bottom: 2px;
  border-radius: 7px;
  background: var(--seg-active);
  box-shadow: var(--seg-shadow);
  transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1), width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
}

/* Chart */
.chart-section {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--card-shadow);
}
.chart-section .chart-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chart-section .legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 500;
}
.chart-section .legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.chart-wrap { position: relative; height: 180px; }

/* Calibration modal */
.cal-btn {
  display: block;
  margin: 16px auto 0;
  padding: 8px 16px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--card-border);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(env(safe-area-inset-bottom, 16px) + 16px);
  width: 100%;
  max-width: 400px;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 16px;
}
.modal .field {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--card-border);
}
.modal .field:last-of-type { border-bottom: none; }
.modal .field label {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.modal .field input {
  width: 80px;
  padding: 6px 10px;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--seg-bg);
  color: var(--text-primary);
  font-size: 0.85rem;
  text-align: center;
  font-family: inherit;
}
.modal .actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.modal .actions button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.modal .btn-cancel {
  background: var(--seg-bg);
  color: var(--text-primary);
}
.modal .btn-save {
  background: #007aff;
  color: #fff;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1 data-i18n="title">環境監測</h1>
    <div class="header-actions">
      <button class="theme-btn" id="langBtn" onclick="toggleLang()" title="Language">EN</button>
      <button class="theme-btn" id="themeBtn" onclick="cycleTheme()" title="Theme">◐</button>
    </div>
  </div>
  <div class="subtitle">
    <span class="status-dot" id="statusDot"></span>
    <span id="updated">載入中…</span>
  </div>
</div>

<div class="cards" id="cards"></div>

<div class="seg-wrap">
  <div class="seg" id="seg">
    <div class="slider" id="slider"></div>
  </div>
</div>

<div class="chart-section">
  <div class="chart-title">
    <span class="legend-item"><span class="legend-dot" style="background:#ff9f0a"></span><span data-i18n="air_temp">氣溫</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#64d2ff"></span><span data-i18n="air_hum">濕度</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#30d158"></span><span data-i18n="water_temp">水溫</span></span>
  </div>
  <div class="chart-wrap"><canvas id="chartT"></canvas></div>
</div>

<div class="chart-section">
  <div class="chart-title">
    <span class="legend-item"><span class="legend-dot" style="background:#ff6723"></span><span data-i18n="soil">土壤</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#bf5af2"></span><span data-i18n="water_level">水位</span></span>
  </div>
  <div class="chart-wrap"><canvas id="chartA"></canvas></div>
</div>

<button class="cal-btn" onclick="openCal()" data-i18n="cal_btn">校準設定</button>

<div class="modal-overlay" id="calModal">
  <div class="modal">
    <h3 data-i18n="cal_title">ADC → % 校準</h3>
    <div class="field"><label data-i18n="soil_dry">土壤 乾 (0%)</label><input id="calSoilMin" type="number"></div>
    <div class="field"><label data-i18n="soil_wet">土壤 濕 (100%)</label><input id="calSoilMax" type="number"></div>
    <div class="field"><label data-i18n="water_low">水位 低 (0%)</label><input id="calWaterMin" type="number"></div>
    <div class="field"><label data-i18n="water_high">水位 高 (100%)</label><input id="calWaterMax" type="number"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeCal()" data-i18n="cancel">取消</button>
      <button class="btn-save" onclick="saveCal()" data-i18n="save">儲存</button>
    </div>
  </div>
</div>

<script>
const FIELDS = [
  { key:'air_temp',    unit:'°C', color:'#ff9f0a', type:'temp' },
  { key:'air_hum',     unit:'%',  color:'#64d2ff', type:'temp' },
  { key:'water_temp',  unit:'°C', color:'#30d158', type:'temp' },
  { key:'soil',        unit:'',   color:'#ff6723', type:'adc' },
  { key:'water_level', unit:'',   color:'#bf5af2', type:'adc' },
];
const RANGES = [['1h',3600],['24h',86400],['7d',604800],['30d',2592000]];
let rangeSec = 86400, chartT, chartA, latestData = null;
let sparkData = [], sparkFrom = 0, sparkTo = 0;

// --- i18n（預設跟瀏覽器語言，切換存 localStorage） ---
const I18N = {
  zh: {
    title: '環境監測', loading: '載入中…',
    air_temp: '氣溫', air_hum: '濕度', water_temp: '水溫', soil: '土壤', water_level: '水位',
    cal_btn: '校準設定', cal_title: 'ADC → % 校準',
    soil_dry: '土壤 乾 (0%)', soil_wet: '土壤 濕 (100%)',
    water_low: '水位 低 (0%)', water_high: '水位 高 (100%)',
    cancel: '取消', save: '儲存',
    just_now: '剛剛', sec_ago: ' 秒前', min_ago: ' 分鐘前', hr_ago: ' 小時前', day_ago: ' 天前',
    locale: 'zh-TW',
  },
  en: {
    title: 'Environment', loading: 'Loading…',
    air_temp: 'Air Temp', air_hum: 'Humidity', water_temp: 'Water Temp', soil: 'Soil', water_level: 'Water Level',
    cal_btn: 'Calibration', cal_title: 'ADC → % Calibration',
    soil_dry: 'Soil dry (0%)', soil_wet: 'Soil wet (100%)',
    water_low: 'Water low (0%)', water_high: 'Water high (100%)',
    cancel: 'Cancel', save: 'Save',
    just_now: 'just now', sec_ago: 's ago', min_ago: 'm ago', hr_ago: 'h ago', day_ago: 'd ago',
    locale: 'en-US',
  },
};
let lang = (function () {
  const s = localStorage.getItem('lang');
  if (s === 'zh' || s === 'en') return s;
  return (navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en';
})();
const t = k => I18N[lang][k] || k;
function applyLang() {
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'EN' : '中';
  if (!latestData) document.getElementById('updated').textContent = t('loading');
}
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  applyLang();
  renderCards();
  refreshChart();
  if (latestData) document.getElementById('updated').textContent = relTime(latestData.ts);
}
applyLang();

// --- Theme (light / dark / auto，預設淺色，存 localStorage) ---
const THEMES = ['light','dark','auto'];
const THEME_ICONS = { auto:'◐', light:'☀︎', dark:'☾' };
function getTheme() {
  const t = localStorage.getItem('theme');
  return THEMES.includes(t) ? t : 'light';
}
function isDarkTheme() {
  const t = getTheme();
  if (t === 'dark') return true;
  if (t === 'light') return false;
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function applyTheme() {
  const t = getTheme();
  if (t === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = THEME_ICONS[t];
}
function cycleTheme() {
  const next = THEMES[(THEMES.indexOf(getTheme()) + 1) % THEMES.length];
  localStorage.setItem('theme', next);
  applyTheme();
  refreshChart();   // 圖表顏色跟著主題重繪
}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (getTheme() === 'auto') refreshChart();
});

// --- Calibration (localStorage) ---
function getCal() {
  try { return JSON.parse(localStorage.getItem('cal')) || {}; } catch { return {}; }
}
function adcToPercent(key, raw) {
  const c = getCal();
  if (key === 'soil' && c.soilMin != null && c.soilMax != null) {
    return Math.round(Math.min(100, Math.max(0, (raw - c.soilMin) / (c.soilMax - c.soilMin) * 100)));
  }
  if (key === 'water_level' && c.waterMin != null && c.waterMax != null) {
    return Math.round(Math.min(100, Math.max(0, (raw - c.waterMin) / (c.waterMax - c.waterMin) * 100)));
  }
  return null;
}
function openCal() {
  const c = getCal();
  document.getElementById('calSoilMin').value = c.soilMin ?? '';
  document.getElementById('calSoilMax').value = c.soilMax ?? '';
  document.getElementById('calWaterMin').value = c.waterMin ?? '';
  document.getElementById('calWaterMax').value = c.waterMax ?? '';
  document.getElementById('calModal').classList.add('show');
}
function closeCal() { document.getElementById('calModal').classList.remove('show'); }
function saveCal() {
  const g = id => { const v = parseInt(document.getElementById(id).value); return isNaN(v) ? null : v; };
  localStorage.setItem('cal', JSON.stringify({
    soilMin: g('calSoilMin'), soilMax: g('calSoilMax'),
    waterMin: g('calWaterMin'), waterMax: g('calWaterMax'),
  }));
  closeCal();
  renderCards();
}

// --- Relative time ---
function relTime(ts) {
  const diff = Math.floor(Date.now()/1000) - ts;
  if (diff < 10) return t('just_now');
  if (diff < 60) return diff + t('sec_ago');
  if (diff < 3600) return Math.floor(diff/60) + t('min_ago');
  if (diff < 86400) return Math.floor(diff/3600) + t('hr_ago');
  return Math.floor(diff/86400) + t('day_ago');
}

// --- Sparkline SVG ---
// X 軸按真實時間定位；相鄰樣本間隔 > GAP_SEC（掉線）就斷線，沒資料的時段留白
const GAP_SEC = 90;
function sparkSVG(rows, key, color, from, to) {
  if (!rows || rows.length < 2) return '';
  const w = 200, h = 32, span = (to - from) || 1;
  const vals = rows.map(r => r[key]).filter(v => v != null);
  if (vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const toXY = r => (((r.ts - from) / span) * w).toFixed(1) + ',' +
                    (h - ((r[key] - min) / range) * (h - 4) - 2).toFixed(1);
  // 依時間間隔切段
  const segs = [];
  let cur = [], prevTs = null;
  for (const r of rows) {
    if (r[key] == null) { if (cur.length) segs.push(cur); cur = []; prevTs = null; continue; }
    if (prevTs != null && r.ts - prevTs > GAP_SEC) { if (cur.length) segs.push(cur); cur = []; }
    cur.push(r); prevTs = r.ts;
  }
  if (cur.length) segs.push(cur);
  const parts = segs.map(s => {
    if (s.length === 1) {
      const [cx, cy] = toXY(s[0]).split(',');
      return '<circle cx="'+cx+'" cy="'+cy+'" r="1.5" fill="'+color+'"/>';
    }
    return '<polyline points="'+s.map(toXY).join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  });
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+parts.join('')+'</svg>';
}

// --- Cards ---
function renderCards() {
  const r = latestData;
  const el = document.getElementById('cards');
  el.innerHTML = FIELDS.map((f, i) => {
    let display = '--', unitStr = f.unit;
    if (r && r[f.key] != null) {
      if (f.type === 'adc') {
        const pct = adcToPercent(f.key, r[f.key]);
        if (pct != null) { display = pct; unitStr = '%'; }
        else { display = r[f.key]; unitStr = ''; }
      } else {
        display = (typeof r[f.key] === 'number') ? (Number.isInteger(r[f.key]) ? r[f.key] : r[f.key].toFixed(1)) : r[f.key];
      }
    }
    const spark = sparkData.length ? sparkSVG(sparkData, f.key, f.color, sparkFrom, sparkTo) : '';
    return '<div class="card"><div class="label"><span class="dot" style="background:'+f.color+'"></span>'+t(f.key)+'</div><div class="value">'+display+(unitStr?'<span class="unit">'+unitStr+'</span>':'')+'</div>'+spark+'</div>';
  }).join('');
}

// --- Fetch latest ---
async function refreshLatest() {
  try {
    const r = await (await fetch('/api/latest')).json();
    if (!r) return;
    latestData = r;
    renderCards();
    const dot = document.getElementById('statusDot');
    const age = Math.floor(Date.now()/1000) - r.ts;
    dot.className = 'status-dot' + (age > 60 ? ' offline' : '');
    document.getElementById('updated').textContent = relTime(r.ts);
  } catch {}
}

// --- Fetch spark data (1h for sparklines；10 秒一筆一小時最多 360 筆) ---
async function refreshSpark() {
  try {
    const now = Math.floor(Date.now()/1000);
    const rows = await (await fetch('/api/data?from='+(now-3600)+'&to='+now+'&limit=400')).json();
    sparkData = rows;
    sparkFrom = now - 3600;
    sparkTo = now;
    renderCards();
  } catch {}
}

// --- Charts ---
function buildGradient(ctx, color) {
  const g = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height);
  g.addColorStop(0, color + '33');
  g.addColorStop(1, color + '00');
  return g;
}
async function refreshChart() {
  try {
    const now = Math.floor(Date.now()/1000);
    const rows = await (await fetch('/api/data?from='+(now-rangeSec)+'&to='+now)).json();
    // 掉線空窗插入 null 斷點，配合 spanGaps:false 讓線在沒資料處斷開
    const pts = [];
    let last = null;
    for (const r of rows) {
      if (last && r.ts - last.ts > GAP_SEC) pts.push(null);
      pts.push(r);
      last = r;
    }
    const labels = pts.map(p => {
      if (!p) return '';
      const d = new Date(p.ts*1000);
      return rangeSec <= 86400
        ? d.toLocaleTimeString(I18N[lang].locale,{hour:'2-digit',minute:'2-digit'})
        : d.toLocaleDateString(I18N[lang].locale,{month:'numeric',day:'numeric'});
    });
    const isDark = isDarkTheme();
    const opts = {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: isDark?'rgba(40,40,42,.9)':'rgba(255,255,255,.95)', titleColor: isDark?'#f5f5f7':'#1d1d1f', bodyColor: isDark?'#ccc':'#555', borderColor: isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)', borderWidth: 1, cornerRadius: 10, padding: 10, bodyFont: { family: '-apple-system' } } },
      scales: { x: { grid: { display: false }, ticks: { maxTicksLimit: 6, color: isDark?'#98989d':'#86868b', font: { size: 10 } }, border: { display: false } }, y: { grid: { color: isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)' }, ticks: { color: isDark?'#98989d':'#86868b', font: { size: 10 }, maxTicksLimit: 5 }, border: { display: false } } },
      elements: { point: { radius: 0, hoverRadius: 4 } },
    };
    const ds = (key, color, canvasId) => {
      const ctx = document.getElementById(canvasId).getContext('2d');
      return {
        label: t(key),
        data: pts.map(p => p ? p[key] : null), borderColor: color, backgroundColor: buildGradient(ctx, color),
        fill: true, pointRadius: 0, borderWidth: 2, tension: .4, spanGaps: false,
      };
    };
    chartT?.destroy(); chartA?.destroy();
    chartT = new Chart(document.getElementById('chartT'), { type:'line', data: { labels, datasets:[ds('air_temp','#ff9f0a','chartT'), ds('air_hum','#64d2ff','chartT'), ds('water_temp','#30d158','chartT')] }, options: opts });
    chartA = new Chart(document.getElementById('chartA'), { type:'line', data: { labels, datasets:[ds('soil','#ff6723','chartA'), ds('water_level','#bf5af2','chartA')] }, options: opts });
  } catch {}
}

// --- Segmented control ---
const segEl = document.getElementById('seg');
const sliderEl = document.getElementById('slider');
RANGES.forEach(([label, sec], i) => {
  const btn = document.createElement('button');
  btn.textContent = label;
  btn.dataset.i = i;
  btn.dataset.s = sec;
  segEl.appendChild(btn);
});
function updateSlider(idx) {
  const btns = segEl.querySelectorAll('button');
  const btn = btns[idx];
  if (!btn) return;
  sliderEl.style.left = btn.offsetLeft + 'px';
  sliderEl.style.width = btn.offsetWidth + 'px';
}
segEl.addEventListener('click', e => {
  if (!e.target.dataset.s) return;
  rangeSec = +e.target.dataset.s;
  updateSlider(+e.target.dataset.i);
  refreshChart();
});
setTimeout(() => updateSlider(1), 100);

// --- Init ---
refreshLatest(); refreshSpark(); refreshChart();
setInterval(refreshLatest, 10000);
setInterval(refreshSpark, 60000);
setInterval(refreshChart, 60000);
setInterval(() => { if(latestData) document.getElementById('updated').textContent = relTime(latestData.ts); }, 5000);
</script>
